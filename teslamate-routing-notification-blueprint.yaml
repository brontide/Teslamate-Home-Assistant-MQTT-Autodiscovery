blueprint:
  name: "TeslaMate: Smart Route Notification"
  description: "Identifies route changes and notifies the selected target. Notifications trigger on route changes once there is an ETA and the vehicle is in drive."
  domain: automation
  input:
    destination_entity:
      name: Tesla Destination Sensor
      description: "This should be the entity from TeslaMate integration ending in _destination e.g. sensor.mycar_destination"
      selector:
        entity:
          filter:
            - domain: sensor
    notify_target:
      name: Notification Target
      description: "e.g. notify.mobile_app_eric_phone"
      default: ""
      selector:
        text:
    debounce_time:
      name: Debounce Time
      description: "Seconds to wait before acting on a destination change. Useful to allow fumbling with the nav"
      default: 20
      selector:
        number:
          min: 0
          max: 120
          step: 5
          unit_of_measurement: seconds
          mode: slider

mode: parallel
max: 10

trigger:
  - platform: state
    entity_id: !input destination_entity

variables:
  dest_entity: !input destination_entity
  gear_entity: "{{ dest_entity.replace('_destination', '_shift_state') }}"
  eta_entity: "{{ dest_entity.replace('_destination', '_minutes_to_arrival') }}"
  notify_target: !input notify_target
  debounce_time: !input debounce_time

condition:
  - alias: "Ignore state changes to or from unknown ( cell connectivity ), to '', or dups"
    condition: template
    value_template: >
      {{ trigger.to_state.state not in ['unknown', 'unavailable', 'none', ''] and 
         trigger.from_state.state not in ['unknown', 'unavailable', 'none'] and
         trigger.from_state.state != trigger.to_state.state }}

action:
  - alias: "Allow time for the nav to settle"
    delay: 
      seconds: "{{ debounce_time }}"
  
  - alias: "Wait for the car to be in drive"
    wait_template: "{{ is_state(gear_entity, 'D') }}"
    timeout: "00:10:00"
    continue_on_timeout: true

  - alias: "Wait for ETA to be available"
    wait_template: "{{ states(eta_entity) | float(-1) >= 0 }}"
    timeout: "00:01:00"
    continue_on_timeout: true

  - alias: "Drop stale nav updates if a second was entered while automation was running"
    condition: template
    value_template: "{{ states(dest_entity) == trigger.to_state.state }}"

  - alias: "Send Notification"
    action: "{{ notify_target }}"
    data:
      title: "🚗 {{ device_name(dest_entity) }} 🚗"
      message: >
        {% set mins = states(eta_entity) | float(0) %}
        {% set eta = (now() + timedelta(minutes=mins)).strftime('%-I:%M %p') %}
        Dest: 📍 {{ trigger.to_state.state }}  ETA: 🕒 {{ eta }}
      data:
        tag: "{{ dest_entity }}_route"
        ttl: 0
        priority: high
